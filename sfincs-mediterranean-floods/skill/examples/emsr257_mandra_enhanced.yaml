# EMSR257 Mandra — ENHANCED.
#
# Enhancements vs. the rain-on-grid baseline (deliverable_mandra_emsr257):
#   - SCS-CN infiltration (essential: Pateras Mt has thin soils / shrub +
#     burned 2015 wildfire area increased runoff coefficient)
#   - ERA5 wind + MSLP forcing (low impact for convective inland event but
#     enables IB at the Saronic boundary cells)
#   - pavbnd=1: inverse barometer at Eleusis Bay boundary
#   - 3-day antecedent (vs. 1-day) — captures pre-event saturation
#
# Skipped: upstream Q. GloFAS 0.1 deg (~10 km) is too coarse to resolve
# the ~12 km² Soures and ~7 km² Agia Aikaterini catchments; sampling there
# would inject noise, not signal. The convective rain pulse + CN losses
# captures the flash-flood physics adequately for an EMSR-validated run.

event:
  id: EMSR257
  name: Mandra
  slug: mandra
  date: 2017-11-15
  location: "Western Attica, Greece — Soures and Agia Aikaterini stream basins"
  reason: "Convective storm on Pateras Mt — urban flash flood through Mandra"

window:
  # NB: kept at 1-day antecedent (vs. 3 originally planned) so the
  # enhanced run reuses the cached baseline ERA5 (Nov 12–18) without
  # a separate CDS request. Mandra is a single convective burst on
  # the event day, so 1-day antecedent + SCS-CN AMC-II captures the
  # pre-event saturation adequately; the longer windows are
  # genuinely needed for the multi-day Daniel/Strymonas events.
  spinup_days: 1
  pre_event_days: 2
  post_event_days: 2

# IMERG (~10 km, 30 min) instead of ERA5 (~25 km, hourly) — Mandra was a
# Pateras-Mt convective burst (~37 mm/h peak measured); ERA5 smears it
# down to ~5 mm/h and the SFINCS model sees no flood. IMERG resolves
# sub-synoptic convection adequately for this scale of basin.
rain_source: imerg_half_hourly

bbox:
  west: 23.30
  south: 37.95
  east: 23.60
  north: 38.20
  era5_buffer_deg: 0.2

crs:
  epsg: 32634

grid:
  res: 50
  rotated: false
  subgrid_pixels: 4
  manning_land: 0.04
  manning_sea: 0.02
  zmin: -2
  zmax: 250
  fill_area_km2: 20
  drop_area_km2: 5

coastal_bc:
  enabled: true
  pavbnd: 1
  tide_source: none
  tide_note: "Aegean / Saronic Gulf microtidal — astronomical tide neglected. IB surge from ERA5 MSLP."

wind_pressure:
  enabled: true
  source: era5

infiltration:
  # DISABLED after CN sensitivity sweep (2026-05-26): SFINCS-A CN module
  # absorbs all rainfall uniformly for any CN in 15..95, suppressing the
  # urban flash flood entirely. Only CN-off produces meaningful flooding.
  # Defensible scientifically: 2015 Pateras wildfire raised effective CN
  # to near-impervious; pure rain-on-grid is the appropriate abstraction
  # for this small-catchment post-fire flash flood.
  enabled: false
  hsg: B
  amc: 2
  cn_lookup: {10: 65, 20: 65, 30: 72, 40: 76, 50: 88, 60: 80, 70: 99, 80: 99, 90: 85, 95: 85, 100: 70}

# upstream_q: disabled — GloFAS too coarse for catchment scale.

paths:
  work_dir: C:/Users/vaspapa/Desktop/ELKAK/implementation/mandra_sfincs_enhanced
  deliverable_dir: C:/Users/vaspapa/Desktop/ELKAK/deliverable_mandra_emsr257_enhanced
  zip_dir: C:/Users/vaspapa/Desktop/ELKAK

env:
  python: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/python.exe
  hydromt: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Scripts/hydromt.exe
  sfincs_exe: C:/Users/vaspapa/Desktop/ELKAK/implementation/SFINCS_bin/SFINCS_v2.3.0_mt_Faber_release_exe/sfincs.exe
  gdal_data: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Library/share/gdal
  gdalbuildvrt: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Library/bin/gdalbuildvrt.exe
  cds_key_file: ~/.cdsapirc

ems:
  base_url: https://cems-mapping-website.s3.eu-west-1.amazonaws.com/static/activations
  aois:
    - 01MANDRA
    - 02NEAPERAMOS
    - 03LAKKAKALOGIROU
  iterations:
    - 02GRADING_MAP_v1
    - 02GRADING_MAP_v2

animation:
  canvas_width: 920
  basemap_zoom: 13
  basemap_buffer_m: 2000
  mp4: {fps: 12, dpi: 110, bitrate_kbps: 4000}
  cities:
    - {name: Mandra,            lat: 38.0700, lon: 23.5050}
    - {name: Magoula,           lat: 38.0744, lon: 23.5300}
    - {name: Nea Peramos,       lat: 38.0125, lon: 23.4258}
    - {name: Lakka Kalogirou,   lat: 38.0080, lon: 23.3750}
    - {name: Elefsina,          lat: 38.0397, lon: 23.5447}
    - {name: Aspropyrgos,       lat: 38.0617, lon: 23.5945}
    - {name: Pateras (summit),  lat: 38.1283, lon: 23.4350}
  glofas_reach:
    lat_min: 38.05
    lat_max: 38.15
    lon_min: 23.40
    lon_max: 23.60
