meta:
  version: 1
  hydromt_version: ">=0.10"
  root: C:/Users/vaspapa/Desktop/ELKAK/implementation/pineios_sfincs_enhanced/data

copdem30:
  data_type: RasterDataset
  driver: raster
  path: copdem30/copdem30.vrt
  crs: 4326
  meta:
    category: topography
    source_url: https://copernicus-dem-30m.s3.amazonaws.com
    source_version: GLO-30 (2021)
  rename:
    Band1: elevtn
    band_1: elevtn

esa_worldcover_2021:
  data_type: RasterDataset
  driver: raster
  path: esa_worldcover/esa_worldcover_2021.vrt
  crs: 4326
  meta:
    category: landuse
    source_url: https://esa-worldcover.s3.amazonaws.com
    source_version: v200 (2021)
  rename:
    Band1: landuse
    band_1: landuse

era5_hourly:
  data_type: RasterDataset
  driver: netcdf
  path: era5_pineios.nc
  crs: 4326
  meta:
    category: meteo
    source_version: ERA5-single-levels reanalysis (September 03 2023 - September 11 2023, 0.25 deg)

imerg_half_hourly:
  data_type: RasterDataset
  driver: netcdf
  path: imerg_pineios.nc
  crs: 4326
  meta:
    category: meteo
    source_version: GPM IMERG Final V07 half-hourly (September 03 2023 - September 11 2023, 0.1 deg)

glofas_v4_daily:
  data_type: RasterDataset
  driver: netcdf
  path: glofas_pineios_clean.nc
  crs: 4326
  meta:
    category: hydrography
    source_version: GloFAS v4.0 historical reanalysis (September 03 2023 - September 11 2023, 0.05 deg)

cn_raster:
  data_type: RasterDataset
  driver: raster
  path: cn_raster.tif
  crs: 4326
  meta:
    category: infiltration
    source_version: SCS-CN derived from ESA WorldCover (HSG=B, AMC=II) via TR-55 class lookup
  rename:
    Band1: cn
    band_1: cn
