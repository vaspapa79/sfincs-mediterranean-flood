# EMSR692 Storm Daniel / Pineios — ENHANCED (wide bbox, full forcing).
#
# Enhancements vs. the rain-on-grid baseline (deliverable_daniel_emsr692):
#   - SCS-CN infiltration (WorldCover -> CN; HSG=B, AMC=II)
#   - ERA5 wind + MSLP forcing (medicane: ~30 m/s winds, ~25 hPa drop)
#   - pavbnd=1: inverse barometer at the Aegean (Thermaikos) boundary
#   - upstream Q (GloFAS v4) injected at Pineios at Trikala (basin head)
#   - 7-day antecedent rain (vs. 1-day) to wet the Thessaly basin
#
# Wide bbox covers the full Pineios basin -> Aegean coast.

event:
  id: EMSR692
  name: Pineios
  slug: pineios
  date: 2023-09-06
  location: "Thessaly, Greece — Pineios River basin (Storm Daniel)"
  reason: "Storm Daniel — extreme rainfall + medicane winds, multi-day flooding"

window:
  spinup_days: 7        # 7-day antecedent vs. 1-day baseline
  pre_event_days: 3
  post_event_days: 4

# IMERG (~10 km, 30 min) instead of ERA5. Even though Storm Daniel was
# synoptic-scale, the embedded convective cells over Pelion / Pindos
# delivered the local rainfall intensities (~200-500 mm/day at some
# stations) that ERA5 25 km cannot resolve.
rain_source: imerg_half_hourly

bbox:
  west: 21.84
  south: 39.31
  east: 22.99
  north: 40.02
  era5_buffer_deg: 0.2

crs:
  epsg: 32634

grid:
  res: 150
  rotated: false
  subgrid_pixels: 4
  manning_land: 0.04
  manning_sea: 0.02
  zmin: -2
  zmax: 400
  fill_area_km2: 20
  drop_area_km2: 5

coastal_bc:
  enabled: true
  pavbnd: 1
  tide_source: none
  tide_note: "Aegean microtidal (<5 cm M2; Tsimplis & Bryden 2000) — astronomical tide neglected. Sea-level dynamics captured via IB from ERA5 MSLP."

wind_pressure:
  enabled: true
  source: era5

# R5: gauge-anchored IMERG bias correction (was a manual CLI step; now captured
# in-config so the rainfall forcing is deterministically reproducible).
# Multiplicative scaling x2.725 over the event window so the watershed-mean
# event total matches the ~400 mm gauge-based estimate (Dimitriou et al. 2024).
# Values recovered from imerg_pineios.nc:bias_correction. Applied by
# run_pipeline.py step 06b via bias_correct_imerg.py, between IMERG download and prep.
rain_bias_correct:
  enabled: true
  target_mm: 400
  watershed_bbox: [22.0, 39.4, 22.95, 40.0]   # minlon,minlat,maxlon,maxlat
  event_start: "2023-09-04 00:00"               # UTC
  event_end:   "2023-09-08 23:30"

infiltration:
  # DISABLED after 2026-05-27 sensitivity test: with bias-corrected IMERG
  # (target 400 mm watershed mean per Efstratiadis 2024), the SCS-CN
  # Method-A absorbs essentially all the additional rainfall and the
  # modelled flood area saturates at ~40 km² (vs ~1500 km² observed).
  # Same SFINCS-A behaviour observed on Mandra (see App.~A.2). Defensible
  # scientifically for Daniel: rainfall intensities exceeded soil
  # infiltration capacity throughout the event; pure rain-on-grid is the
  # appropriate abstraction for this extreme-precipitation event.
  enabled: false
  hsg: B
  amc: 2
  cn_lookup: {10: 65, 20: 65, 30: 72, 40: 76, 50: 88, 60: 80, 70: 99, 80: 99, 90: 85, 95: 85, 100: 70}

upstream_q:
  enabled: true
  src_points:
    # lon/lat = GloFAS sampling location (±0.1° window search for max discharge).
    # src_lon/src_lat (optional) = SFINCS source injection location; used when the
    # natural river location is outside the model bbox (west=21.84, south=39.31).
    - {name: pineios_trikala,   lon: 21.77, lat: 39.56, src_lon: 21.86, src_lat: 39.56}  # Pineios at Trikala → injects at W bbox boundary
    - {name: pineios_kalambaka, lon: 21.63, lat: 39.70, src_lon: 21.86, src_lat: 39.70}  # Aspropotamos at Kalambaka → injects at W bbox boundary
    - {name: titarisios,        lon: 22.42, lat: 39.71}                                   # Titarisios — inside bbox
    - {name: enipeas,           lon: 22.39, lat: 39.30, src_lon: 22.39, src_lat: 39.33}  # Enipeas — injects just inside S bbox

paths:
  work_dir: C:/Users/vaspapa/Desktop/ELKAK/implementation/pineios_sfincs_enhanced
  deliverable_dir: C:/Users/vaspapa/Desktop/ELKAK/deliverable_daniel_emsr692_enhanced
  zip_dir: C:/Users/vaspapa/Desktop/ELKAK

env:
  python: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/python.exe
  hydromt: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Scripts/hydromt.exe
  sfincs_exe: C:/Users/vaspapa/Desktop/ELKAK/implementation/SFINCS_bin/SFINCS_v2.3.0_mt_Faber_release_exe/sfincs.exe
  gdal_data: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Library/share/gdal
  gdalbuildvrt: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Library/bin/gdalbuildvrt.exe
  cds_key_file: ~/.cdsapirc

ems:
  # EMSR692 lives on the new rapidmapping dashboard-api (different from
  # EMSR122 / EMSR257 which are still on the legacy S3 bucket).
  # When base_url contains "rapidmapping…", download_ems.py queries the
  # public-activations API to discover AOIs + product versions; the aois
  # and iterations lists below are kept for documentation only and are
  # ignored by the script for this backend.
  base_url: https://rapidmapping.emergency.copernicus.eu/backend
  aois:
    # Discovered via API on 2026-05-27 — 7 AOIs covering the whole Thessaly basin.
    - AOI01_Magnesia
    - AOI02_Palamas
    - AOI03_Larissa
    - AOI04_Stefanovikio
    - AOI05_Karditsa
    - AOI06_Keramidi
    - AOI07_Kalamaki
  iterations:
    # API auto-discovers DEL / DEL_MONIT01 … DEL_MONIT05 (only those with statusCode='F' downloaded).
    - DEL
    - DEL_MONIT01
    - DEL_MONIT02
    - DEL_MONIT03
    - DEL_MONIT04
    - DEL_MONIT05

animation:
  canvas_width: 940
  basemap_zoom: 12
  basemap_buffer_m: 3000
  mp4: {fps: 12, dpi: 110, bitrate_kbps: 4000}
  cities:
    - {name: Larissa,  lat: 39.6390, lon: 22.4191}
    - {name: Karditsa, lat: 39.3640, lon: 21.9216}
    - {name: Trikala,  lat: 39.5550, lon: 21.7682}
    - {name: Volos,    lat: 39.3681, lon: 22.9426}
    - {name: Lake Karla, lat: 39.479, lon: 22.85}
