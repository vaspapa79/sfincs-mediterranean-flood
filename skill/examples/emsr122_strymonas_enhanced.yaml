# EMSR122 Strymonas — ENHANCED (full forcing).
#
# Enhancements vs. the rain-on-grid baseline (deliverable_strymonas_emsr122):
#   - upstream Q at Kerkini outlet (the 2015 event was Kerkini-spillway-driven)
#   - SCS-CN infiltration
#   - ERA5 wind + MSLP forcing
#   - pavbnd=1: inverse barometer at the Strymonian Gulf boundary
#   - 7-day antecedent rain (vs. 1-day)

event:
  id: EMSR122
  name: Strymonas
  slug: strymonas
  date: 2015-03-31
  location: "Central Macedonia, Greece — Strymonas River basin"
  reason: "Heavy rainfall + Lake Kerkini spillway + transboundary inflow"

window:
  spinup_days: 7
  pre_event_days: 3
  post_event_days: 3

# IMERG (~10 km, 30 min) instead of ERA5. The 2015 EMSR122 event was
# driven by transboundary Kerkini inflow, but the over-bbox rainfall
# bands also include local convective cells that ERA5 25 km cannot
# resolve.
rain_source: imerg_half_hourly

bbox:
  west: 22.8
  south: 40.6
  east: 24.0
  north: 41.4
  era5_buffer_deg: 0.2

crs:
  epsg: 32634

grid:
  res: 150
  rotated: false
  subgrid_pixels: 4
  manning_land: 0.04
  manning_sea: 0.02
  zmin: -2
  zmax: 250
  fill_area_km2: 20
  drop_area_km2: 5

coastal_bc:
  enabled: true
  pavbnd: 1
  tide_source: none
  tide_note: "Aegean microtidal — astronomical tide neglected. IB surge from ERA5 MSLP."

wind_pressure:
  enabled: true
  source: era5

# R5: no gauge-anchored IMERG bias correction for Strymonas — the 2015 EMSR122
# event was Kerkini-spillway / transboundary-inflow driven (handled by upstream_q
# below), not a small-catchment convective rainfall underestimate. Raw IMERG is
# used as-is. Block kept explicit (disabled) so the absence is documented.
rain_bias_correct:
  enabled: false

infiltration:
  enabled: true
  hsg: B
  amc: 2
  cn_lookup: {10: 65, 20: 65, 30: 72, 40: 76, 50: 88, 60: 80, 70: 99, 80: 99, 90: 85, 95: 85, 100: 70}

upstream_q:
  enabled: true
  src_points:
    - {name: kerkini_outlet, lon: 23.3991, lat: 41.0289}  # R2 fix: relocated src (UTM34N 701692/4544737); headline v3 run
    - {name: angitis,        lon: 23.92, lat: 41.00}      # eastern tributary

paths:
  work_dir: C:/Users/vaspapa/Desktop/ELKAK/implementation/emsr122_sfincs_enhanced
  deliverable_dir: C:/Users/vaspapa/Desktop/ELKAK/deliverable_strymonas_emsr122_enhanced
  zip_dir: C:/Users/vaspapa/Desktop/ELKAK

env:
  python: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/python.exe
  hydromt: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Scripts/hydromt.exe
  sfincs_exe: C:/Users/vaspapa/Desktop/ELKAK/implementation/SFINCS_bin/SFINCS_v2.3.0_mt_Faber_release_exe/sfincs.exe
  gdal_data: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Library/share/gdal
  gdalbuildvrt: C:/Users/vaspapa/AppData/Local/miniforge3/envs/sfincs-viz/Library/bin/gdalbuildvrt.exe
  cds_key_file: ~/.cdsapirc

ems:
  base_url: https://cems-mapping-website.s3.eu-west-1.amazonaws.com/static/activations
  aois:
    - 01STRYMONAS
    - 02BALTOTOPI
    - 03ACHINOS
    - 04MAVROTHALASSA
  iterations:
    - REFERENCE_OVERVIEW_v2
    - DELINEATION_OVERVIEW_v2
    - DELINEATION_OVERVIEW-MONIT01_v1
    - DELINEATION_OVERVIEW-MONIT01_v2
    - DELINEATION_OVERVIEW-MONIT02_v1
    - DELINEATION_OVERVIEW-MONIT03_v1

animation:
  canvas_width: 920
  basemap_zoom: 12
  basemap_buffer_m: 3000
  mp4: {fps: 12, dpi: 110, bitrate_kbps: 4000}
  cities:
    - {name: Serres,       lat: 41.0853, lon: 23.5483}
    - {name: Sidirokastro, lat: 41.2347, lon: 23.3897}
    - {name: Nigrita,      lat: 40.9036, lon: 23.4956}
    - {name: Amfipoli,     lat: 40.8167, lon: 23.8500}
    - {name: Kerkini Lake, lat: 41.21,   lon: 23.13}
    - {name: Thessaloniki, lat: 40.6401, lon: 22.9444}
  glofas_reach:
    lat_min: 40.7
    lat_max: 41.3
    lon_min: 23.2
    lon_max: 23.8
